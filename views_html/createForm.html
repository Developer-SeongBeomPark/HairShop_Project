<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create</title>
    <p style="text-align: center;">디자이너 회원가입</p>
</head>
<body>
    <form>
        <div>
            <label for="fnameMF">사진</label>
            <div>
              <input type="file" id="fnameMF" 
              name="fnameMF" accept=".jpg,.gif,.png">
            </div>
          </div>

        <div>
            <label for="">아이디</label>
            <input type="text" placeholder="Enter id">
        </div>

        <div>
            <label for="">비밀번호</label>
            <input type="password" placeholder="Enter password">
        </div>

        <div>
            <label for="">이메일</label>
            <input type="email" placeholder="Enter email"> 
        </div>

        <div>
            <label for="">전화번호</label>
            <input type="text">  
        </div>

        <div>
            <label for="">생년월일</label>
            <input type="text"> (예 : 901225)
        </div>

        <div>
            <label for="">우편번호</label>
            <input type = "text">
            <button>주소 검색</button>  
        </div>

        <div>
            <label for="">주소</label>
            <input type="text" placeholder="주소">
            <input type="text" placeholder="상세주소"> 
        </div>

        <br>
        <label for="">자격증 종류</label>
        <select name="" id=""> 
            <option value="1">상장형 자격증</option>
            <option value="2">수첩형 자격증</option>
        </select>

        <!-- 상장형 자격증인 경우-->
        <div>
            <label for="">자격증 관리번호</label>
            <input type="text">  
        </div>
        
        <br>
        <!-- 수첩형 자격증인 경우-->
        <div>
            <label for="">자격증 번호</label>
            <input type="text"> (예:12345678901A)
        </div>

        <div>
            <label for="">발급(등록)연월일</label>
            <input type="text"> (예:20050101)  
        </div>
        
        <div>
            <label for="">자격증 내지번호</label>
            <input type="text"> (예:0901234567)
        </div>

        <div>
            <button>가입</button>
            <button>취소</button>
        </div>
    </form>
</body>
</html>
